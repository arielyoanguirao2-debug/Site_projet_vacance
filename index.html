<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebVault — Galerie de Structures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>

<div id="sidebar-scrim" aria-hidden="true"></div>

<!-- ══════════════════════════════════════
     CARD TEMPLATE
     IMPORTANT : pas de .card-link absolu.
     Le clic est sur .card-thumb uniquement.
     Les boutons du footer sont libres.
═══════════════════════════════════════ -->
<template id="card-tpl">
  <article class="card" role="listitem">

    <!-- Zone cliquable → ouvre la modale -->
    <div class="card-thumb" role="button" tabindex="0" aria-label="Voir le rendu">
      <div class="card-thumb-bg">
        <div class="card-thumb-icon" aria-hidden="true"></div>
      </div>
      <div class="card-overlay" aria-hidden="true">
        <div class="preview-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Voir le rendu
        </div>
      </div>
    </div>

    <!-- Infos -->
    <div class="card-body">
      <div class="card-meta">
        <span class="card-category"></span>
        <span class="card-date"></span>
      </div>
      <h2 class="card-title"></h2>
      <p class="card-path"></p>
    </div>

    <!-- Actions — libres de tout z-index bloquant -->
    <div class="card-footer">
      <button type="button" class="btn-copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copier le code
      </button>

      <button type="button" class="btn-dots" aria-label="Plus d'options" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="5"  r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="19" r="1.3" fill="currentColor" stroke="none"/>
        </svg>
      </button>

      <!-- Dropdown : positionné par JS en position:fixed -->
      <div class="card-dropdown" role="menu">
        <button class="dropdown-item dd-view" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Voir
        </button>
        <button class="dropdown-item dd-newtab" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          Ouvrir dans un nouvel onglet
        </button>
        <button class="dropdown-item dd-copy" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copier le HTML
        </button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item dd-delete danger" role="menuitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
          Supprimer
        </button>
      </div>
    </div>

  </article>
</template>

     MODAL

  <div class="modal-bar">

    </div>
    <div class="modal-actions">
      <div class="view-toggle" role="group">
        <button type="button" id="btn-view-render" class="toggle-btn active" aria-pressed="true">

        </button>

      </button>

<!-- TOAST -->
<div id="toast" role="status" aria-live="polite" aria-atomic="true">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  <span id="toast-msg">Copié !</span>
</div>

<script>
'use strict';

/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const API_BASE   = 'https://stuffone-backend.onrender.com';
const API_ROUTES = [
  '/api/structures', '/api/sites', '/structures', '/sites',
  '/api/pages', '/pages', '/api/items', '/items',
];
const SECTIONS = [
  { id:'accueil',   label:'Accueil',      color:'#e8ff47', kw:['accueil','home','index','hero'] },
  { id:'landing',   label:'Landing Pages', color:'#47c4ff', kw:['landing','lp','promo','funnel','conversion'] },
  { id:'ecommerce', label:'E-commerce',   color:'#ff8c47', kw:['shop','store','boutique','ecommerce','produit','product','cart','panier'] },
  { id:'dashboard', label:'Dashboard',    color:'#c447ff', kw:['dashboard','admin','panel','analytics','stats','backoffice'] },
  { id:'portfolio', label:'Portfolio',    color:'#47ffb5', kw:['portfolio','folio','about','projets','projects','cv'] },
  { id:'blog',      label:'Blog',         color:'#ff4776', kw:['blog','article','post','news','journal','actu'] },
  { id:'autres',    label:'Autres',       color:'#666',    kw:[] },
];

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let allData      = [];
let deletedIds   = new Set();
let activeSection = 'all';

/* ══════════════════════════════════════════
   UTILS
══════════════════════════════════════════ */
const $       = id => document.getElementById(id);
const esc     = s  => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const initials= s  => s.split(/\s+/).map(w=>w[0]||'').join('').slice(0,3).toUpperCase();
const fmtDate = d  => { try { return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); } catch{return '';} };

function debounce(fn, ms) {
  let t;
  return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

/* ══════════════════════════════════════════
   CLASSIFY — assigne la bonne section
══════════════════════════════════════════ */
function classify(title, category) {
  const hay = `${title} ${category}`.toLowerCase();
  for (const s of SECTIONS) {
    if (s.id === 'autres') continue;
    if (s.kw.some(k => hay.includes(k))) return s.id;
  }
  return 'autres';
}

function sectionColor(id) { return SECTIONS.find(s=>s.id===id)?.color || '#666'; }
function sectionLabel(id) { return SECTIONS.find(s=>s.id===id)?.label || id; }

/* ══════════════════════════════════════════
   NORMALIZE
══════════════════════════════════════════ */
function normalizeItem(r) {
  const title    = r.title    || r.name  || r.label    || 'Sans titre';
  const category = r.category || r.type  || r.section  || 'Autre';
  const src      = r.source_code || r.html || r.code   || null;
  return {
    id:          String(r.id ?? r._id ?? Math.random()),
    title,
    category,
    section:     classify(title, category),
    path:        r.path || r.url || r.link || r.src || '#',
    source_code: src,
    created_at:  r.created_at || r.date || r.updatedAt || null,
  };
}
function normalizeResponse(data) {
  if (Array.isArray(data)) return data.map(normalizeItem);
  for (const k of ['data','structures','sites','pages','items','results','records']) {
    if (data[k] && Array.isArray(data[k])) return data[k].map(normalizeItem);
  }
  if (data.id || data._id || data.title) return [normalizeItem(data)];
  return [];
}

/* ══════════════════════════════════════════
   API FETCH
══════════════════════════════════════════ */
async function apiFetch() {
  const errs = [];
  for (const route of API_ROUTES) {
    try {
      const res = await fetch(`${API_BASE}${route}`, {
        headers: { Accept: 'application/json' },
        signal:  AbortSignal.timeout(12000),
      });
      if (!res.ok) { errs.push(`${route} → HTTP ${res.status}`); continue; }
      if (!(res.headers.get('content-type')||'').includes('application/json')) { errs.push(`${route} → non-JSON`); continue; }
      const items = normalizeResponse(await res.json());
      if (!items.length) { errs.push(`${route} → vide`); continue; }
      console.info(`[WebVault] ✓ ${route} — ${items.length} structures`);
      return items;
    } catch(e) { errs.push(`${route} → ${e.message}`); }
  }
  throw new Error(errs.join('\n'));
}

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  $('toast-msg').textContent = msg || 'OK';
  $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2400);
}

/* ══════════════════════════════════════════
   COPY
══════════════════════════════════════════ */
function copyCode(site, btn) {
  const text = site.source_code || [
    `<iframe src="${site.path}" title="${esc(site.title)}"`,
    `  width="100%" height="600" loading="lazy"`,
    `  sandbox="allow-scripts allow-forms allow-popups"`,
    `  referrerpolicy="no-referrer" frameborder="0"></iframe>`,
  ].join('\n');

  const origHTML = btn ? btn.innerHTML : '';
  const done = () => {
    showToast('Code copié !');
    if (!btn) return;
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Copié !`;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = origHTML; }, 2200);
  };
  navigator.clipboard
    ? navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done))
    : fallbackCopy(text, done);
}
function fallbackCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch {}
  document.body.removeChild(ta);
}

/* ══════════════════════════════════════════
   DROPDOWN — position fixed calculée par JS
══════════════════════════════════════════ */
let openDropdown = null; // { btn, menu }

function closeAllDropdowns() {
  if (!openDropdown) return;
  openDropdown.menu.classList.remove('open');
  openDropdown.btn.classList.remove('active');
  openDropdown.btn.setAttribute('aria-expanded','false');
  openDropdown = null;
}

function openDropdownMenu(btn, menu) {
  closeAllDropdowns();

  /* Calcul position fixed : sous le bouton, aligné à droite */
  const r      = btn.getBoundingClientRect();
  const mW     = 210;
  const mH     = 190;
  const margin = 8;

  let top  = r.bottom + 6;
  let left = r.right - mW;

  /* Déborde à droite ? */
  if (left < margin) left = margin;
  /* Déborde en bas ? Monte au-dessus du bouton */
  if (top + mH > window.innerHeight - margin) top = r.top - mH - 6;
  /* Jamais hors viewport haut */
  if (top < margin) top = margin;

  menu.style.top   = top  + 'px';
  menu.style.left  = left + 'px';
  menu.style.right = 'auto';
  menu.style.bottom= 'auto';

  menu.classList.add('open');
  btn.classList.add('active');
  btn.setAttribute('aria-expanded','true');
  openDropdown = { btn, menu };
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
const modalEl    = $('modal');
const iframeEl   = $('modal-iframe-render');
const sourceView = $('modal-source-view');
const sourceCode = $('modal-source-code');
let   modalSite  = null;

function openModal(site) {
  modalSite = site;
  $('modal-url').textContent = site.title;

  const ntBtn = $('btn-modal-newtab');
  ntBtn.href  = (site.path && site.path !== '#') ? site.path : '#';
  ntBtn.style.display = (site.path && site.path !== '#') ? '' : 'none';

  if (site.source_code) {
    iframeEl.srcdoc = site.source_code;
    sourceCode.textContent = site.source_code;
  } else {
    iframeEl.removeAttribute('srcdoc');
    iframeEl.src = site.path;
    sourceCode.textContent = `/* URL : ${site.path} */`;
  }

  setModalView('render');
  modalEl.showModal();
  requestAnimationFrame(() => modalEl.classList.add('is-open'));
  $('btn-close').focus();
}

function closeModal() {
  modalEl.classList.remove('is-open');
  setTimeout(() => {
    modalEl.close();
    iframeEl.srcdoc = '';
    iframeEl.removeAttribute('src');
    sourceCode.textContent = '';
    modalSite = null;
  }, 260);
}

function setModalView(v) {
  const isR = v === 'render';
  $('btn-view-render').classList.toggle('active', isR);
  $('btn-view-source').classList.toggle('active', !isR);
  $('btn-view-render').setAttribute('aria-pressed', String(isR));
  $('btn-view-source').setAttribute('aria-pressed', String(!isR));
  iframeEl.classList.toggle('hidden', !isR);
  sourceView.classList.toggle('hidden', isR);
}

$('btn-view-render').addEventListener('click', () => setModalView('render'));
$('btn-view-source').addEventListener('click', () => setModalView('source'));
$('btn-modal-copy').addEventListener('click', () => { if (modalSite) copyCode(modalSite, null); });
$('btn-close').addEventListener('click', closeModal);
modalEl.addEventListener('cancel', e => { e.preventDefault(); closeModal(); });
modalEl.addEventListener('click',  e => { if (e.target === modalEl) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modalEl.open) closeModal(); });

/* ══════════════════════════════════════════
   BUILD CARD — sans stretched-link
══════════════════════════════════════════ */
const cardTpl = $('card-tpl');

function buildCard(site, idx, color) {
  const node = cardTpl.content.cloneNode(true);
  const card = node.querySelector('.card');

  card.dataset.id = site.id;
  card.style.animationDelay = Math.min(idx * 0.035, 0.5) + 's';

  /* ── Thumbnail cliquable ── */
  const thumb = card.querySelector('.card-thumb');
  thumb.setAttribute('aria-label', `Voir le rendu de ${esc(site.title)}`);
  /* Clic souris */
  thumb.addEventListener('click', () => openModal(site));
  /* Clavier (accessibilité) */
  thumb.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(site); }
  });

  /* Style thumbnail */
  const bg = card.querySelector('.card-thumb-bg');
  bg.style.background = `radial-gradient(ellipse at 30% 40%, ${color}1a 0%, transparent 65%), #111`;
  card.querySelector('.card-thumb-icon').textContent = initials(site.title);

  /* Meta */
  const catEl = card.querySelector('.card-category');
  catEl.textContent      = site.category;
  catEl.style.color      = color;
  catEl.style.background = color + '1a';
  catEl.style.borderColor= color + '30';

  const dateEl = card.querySelector('.card-date');
  dateEl.textContent = site.created_at ? fmtDate(site.created_at) : '';

  card.querySelector('.card-title').textContent = site.title;
  card.querySelector('.card-path').textContent  = site.source_code ? '(code intégré)' : (site.path || '');

  /* ── Bouton Copier ── */
  const copyBtn = card.querySelector('.btn-copy');
  copyBtn.addEventListener('click', e => {
    e.stopPropagation();
    copyCode(site, copyBtn);
  });

  /* ── Bouton 3 points + Dropdown ── */
  const dotsBtn  = card.querySelector('.btn-dots');
  const dropdown = card.querySelector('.card-dropdown');

  dotsBtn.addEventListener('click', e => {
    e.stopPropagation();
    const isOpen = openDropdown && openDropdown.menu === dropdown;
    if (isOpen) { closeAllDropdowns(); }
    else        { openDropdownMenu(dotsBtn, dropdown); }
  });

  /* Actions dropdown */
  card.querySelector('.dd-view').addEventListener('click', e => {
    e.stopPropagation(); closeAllDropdowns(); openModal(site);
  });
  card.querySelector('.dd-newtab').addEventListener('click', e => {
    e.stopPropagation(); closeAllDropdowns();
    if (site.path && site.path !== '#') window.open(site.path, '_blank', 'noopener,noreferrer');
    else showToast('Pas d\'URL externe');
  });
  card.querySelector('.dd-copy').addEventListener('click', e => {
    e.stopPropagation(); closeAllDropdowns(); copyCode(site, copyBtn);
  });
  card.querySelector('.dd-delete').addEventListener('click', e => {
    e.stopPropagation(); closeAllDropdowns(); deleteCard(card, site);
  });

  return node;
}

/* ══════════════════════════════════════════
   DELETE
══════════════════════════════════════════ */
function deleteCard(card, site) {
  deletedIds.add(site.id);
  card.style.transition = 'opacity .25s, transform .25s';
  card.style.opacity    = '0';
  card.style.transform  = 'scale(0.95)';
  setTimeout(() => {
    card.remove();
    const secEl = $(`sec-${site.section}`);
    if (secEl) {
      const rem = secEl.querySelectorAll('.card').length;
      if (rem === 0) { secEl.remove(); buildNav(); }
      else {
        const pill = secEl.querySelector('.section-pill');
        if (pill) pill.textContent = `${rem} structure${rem>1?'s':''}`;
      }
    }
    $('visible-count').textContent = document.querySelectorAll('.card').length;
    $('footer-count').textContent  = allData.length - deletedIds.size;
    showToast('Supprimé');
  }, 280);
}

/* ══════════════════════════════════════════
   RENDER SECTIONS
══════════════════════════════════════════ */
function renderSections(items) {
  const container = $('sections-container');
  container.innerHTML = '';

  const bySec = {};
  items.forEach(s => {
    if (!bySec[s.section]) bySec[s.section] = [];
    bySec[s.section].push(s);
  });

  SECTIONS.forEach(sec => {
    const list = bySec[sec.id];
    if (!list || !list.length) return;

    const group = document.createElement('section');
    group.className      = 'section-group';
    group.id             = `sec-${sec.id}`;
    group.dataset.section= sec.id;

    group.innerHTML = `
      <div class="section-header">
        <h2 class="section-title" style="color:${sec.color}">${esc(sec.label)}</h2>
        <span class="section-pill" style="color:${sec.color};background:${sec.color}1a;border-color:${sec.color}30">
          ${list.length} structure${list.length>1?'s':''}
        </span>
      </div>`;

    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    grid.setAttribute('role','list');

    const frag = document.createDocumentFragment();
    list.forEach((site, i) => frag.appendChild(buildCard(site, i, sec.color)));
    grid.appendChild(frag);
    group.appendChild(grid);
    container.appendChild(group);
  });

  $('visible-count').textContent = items.length;
  buildNav();
}

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
function runSearch(q) {
  const qLow = q.trim().toLowerCase();

  const filtered = allData.filter(s => {
    if (deletedIds.has(s.id)) return false;
    const secOk = activeSection === 'all' || s.section === activeSection;
    if (!qLow) return secOk;
    return secOk && (
      s.title.toLowerCase().includes(qLow) ||
      s.category.toLowerCase().includes(qLow) ||
      sectionLabel(s.section).toLowerCase().includes(qLow) ||
      (s.source_code && s.source_code.toLowerCase().includes(qLow))
    );
  });

  const empty = $('empty-state');
  if (!filtered.length) { $('sections-container').innerHTML = ''; empty.classList.add('visible'); }
  else { empty.classList.remove('visible'); renderSections(filtered); }
}

/* ══════════════════════════════════════════
   NAV
══════════════════════════════════════════ */
function buildNav() {
  const menu = $('nav-menu');
  menu.innerHTML = '';

  const total = allData.length - deletedIds.size;
  menu.appendChild(navItem('all', 'Toutes', total, '#666'));

  SECTIONS.forEach(sec => {
    const el = $(`sec-${sec.id}`);
    if (!el) return;
    const count = el.querySelectorAll('.card').length;
    if (!count) return;
    menu.appendChild(navItem(sec.id, sec.label, count, sec.color));
  });

  $('footer-count').textContent = total;
}

function navItem(id, label, count, color) {
  const btn = document.createElement('button');
  btn.type      = 'button';
  btn.className = 'nav-item' + (activeSection === id ? ' active' : '');
  btn.setAttribute('role','listitem');

  const dot = document.createElement('span');
  dot.className = 'nav-dot';
  if (id !== 'all') { dot.style.background = color; dot.style.opacity = '0.6'; }

  const badge = document.createElement('span');
  badge.className   = 'nav-count';
  badge.textContent = count;

  btn.appendChild(dot);
  btn.appendChild(document.createTextNode(' ' + label + ' '));
  btn.appendChild(badge);

  btn.addEventListener('click', () => {
    activeSection = id;
    $('current-section-label').textContent = id === 'all' ? 'Toutes' : label;

    if (id === 'all') {
      document.querySelectorAll('.section-group').forEach(g => g.style.display = '');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      document.querySelectorAll('.section-group').forEach(g => {
        g.style.display = g.dataset.section === id ? '' : 'none';
      });
      $(`sec-${id}`)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    runSearch($('search-input').value);
    if (window.innerWidth <= 900) closeSidebar();
  });

  return btn;
}

/* ══════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════ */
function openSidebar() {
  $('sidebar').classList.add('drawer-open');
  $('sidebar-scrim').classList.add('visible');
  $('sidebar-scrim').removeAttribute('aria-hidden');
  $('btn-burger').setAttribute('aria-expanded','true');
}
function closeSidebar() {
  $('sidebar').classList.remove('drawer-open');
  $('sidebar-scrim').classList.remove('visible');
  $('sidebar-scrim').setAttribute('aria-hidden','true');
  $('btn-burger').setAttribute('aria-expanded','false');
}
$('btn-burger').addEventListener('click', () =>
  $('sidebar').classList.contains('drawer-open') ? closeSidebar() : openSidebar()
);
$('sidebar-scrim').addEventListener('click', closeSidebar);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && $('sidebar').classList.contains('drawer-open') && !modalEl.open)
    closeSidebar();
});

/* ══════════════════════════════════════════
   SEARCH INPUT — pas de rechargement
══════════════════════════════════════════ */
const searchInput = $('search-input');
const doSearch    = debounce(() => runSearch(searchInput.value), 200);

searchInput.addEventListener('input', doSearch);
/* Empêche tout rechargement sur Entrée */
searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') e.preventDefault();
});

/* Ferme les dropdowns si on clique n'importe où */
document.addEventListener('click', closeAllDropdowns);
/* Ferme les dropdowns sur scroll aussi */
window.addEventListener('scroll', closeAllDropdowns, { passive: true });

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
async function loadData() {
  $('loading-state').classList.remove('hidden');
  $('api-error-state').style.display = 'none';
  $('empty-state').classList.remove('visible');
  $('sections-container').innerHTML  = '';

  try {
    allData = await apiFetch();
    $('loading-state').classList.add('hidden');
    runSearch('');
  } catch(err) {
    console.error('[WebVault]', err);
    $('loading-state').classList.add('hidden');
    $('api-error-state').style.display  = 'flex';
    $('api-error-msg').textContent = err.message;
  }
}

$('btn-retry').addEventListener('click', loadData);
loadData();
</script>
</body>
