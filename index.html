<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>WebVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="main.css">
</head>
<body>

<!-- Scrim sidebar mobile -->
<div id="sidebar-scrim" aria-hidden="true"></div>

<!-- ══════════════════════════════
     MENU LATÉRAL GLOBAL
     Un seul, déplacé par JS,
     s'ouvre depuis la droite
══════════════════════════════ -->
<div id="side-menu-scrim" aria-hidden="true"></div>
<div id="side-menu" role="dialog" aria-modal="true" aria-label="Options" aria-hidden="true">
  <div class="side-menu-header">
    <span class="side-menu-title" id="side-menu-title">Options</span>
    <button type="button" class="side-menu-close" id="side-menu-close" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6"  y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="side-menu-items" id="side-menu-items">
    <!-- Items injectés par JS selon la card -->
  </div>
</div>

<!-- ══════════════════════════════
     CARD TEMPLATE
     Pas de stretched-link.
     Thumb = cliquable pour modale.
     Boutons footer = libres.
══════════════════════════════ -->
<template id="card-tpl">
  <article class="card" role="listitem">
    <div class="card-thumb" role="button" tabindex="0" aria-label="Voir le rendu">
      <div class="card-thumb-bg">
        <div class="card-thumb-icon" aria-hidden="true"></div>
      </div>
      <div class="card-overlay" aria-hidden="true">
        <div class="preview-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          Voir le rendu
        </div>
      </div>
    </div>
    <div class="card-body">
      <div class="card-meta">
        <span class="card-category"></span>
        <span class="card-date"></span>
      </div>
      <h2 class="card-title"></h2>
      <p class="card-path"></p>
    </div>
    <div class="card-footer">
      <button type="button" class="btn-copy">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copier le code
      </button>
      <button type="button" class="btn-dots" aria-label="Plus d'options">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="5"  r="1.4" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="12" r="1.4" fill="currentColor" stroke="none"/>
          <circle cx="12" cy="19" r="1.4" fill="currentColor" stroke="none"/>
        </svg>
      </button>
    </div>
  </article>
</template>

<!-- ══════════════════════════════
     SIDEBAR
══════════════════════════════ -->
<aside id="sidebar">
  <div class="logo">
    <div class="logo-mark" aria-hidden="true">
      <svg viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1" fill="#000"/>
        <rect x="9" y="1" width="6" height="6" rx="1" fill="#000"/>
        <rect x="1" y="9" width="6" height="6" rx="1" fill="#000"/>
        <rect x="9" y="9" width="6" height="2" rx="1" fill="#000"/>
        <rect x="9" y="13" width="6" height="2" rx="1" fill="#000"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">WebVault</div>
      <span class="logo-version">Structure Gallery v6.0</span>
    </div>
  </div>
  <div class="nav-section">
    <p class="nav-label" id="nav-heading">Sections</p>
    <nav aria-labelledby="nav-heading">
      <div id="nav-menu" role="list"></div>
    </nav>
  </div>
  <footer class="sidebar-footer">
    <span>DATA_BANK / <span class="accent-text">█████</span></span><br>
    <span id="footer-count">0</span> structures indexées
  </footer>
</aside>

<!-- ══════════════════════════════
     TOPBAR
══════════════════════════════ -->
<header id="topbar">
  <button type="button" id="btn-burger" aria-label="Menu" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <p class="topbar-title">
    <strong id="current-section-label">Toutes</strong> les structures
  </p>
  <div class="search-wrapper">
    <label for="search-input" class="sr-only">Rechercher</label>
    <input id="search-input"
           type="text"
           placeholder="Rechercher…"
           autocomplete="off"
           autocorrect="off"
           autocapitalize="off"
           spellcheck="false"
           inputmode="search">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/>
      <path d="m21 21-4.35-4.35"/>
    </svg>
  </div>
  <div class="topbar-stats">
    <em id="visible-count">0</em> résultats
  </div>
</header>

<!-- ══════════════════════════════
     MAIN
══════════════════════════════ -->
<main id="main">
  <div id="loading-state">
    <div class="loading-spinner"></div>
    <p class="loading-text">Connexion au backend…</p>
  </div>
  <div id="api-error-state">
    <div class="empty-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <p class="empty-title">Serveur introuvable</p>
    <p class="empty-sub" id="api-error-msg">Vérifiez votre connexion.</p>
    <button type="button" id="btn-retry">↺ Réessayer</button>
  </div>
  <div id="empty-state">
    <div class="empty-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>
    <p class="empty-title">Aucun résultat</p>
    <p class="empty-sub">Essayez un autre terme.</p>
  </div>
  <div id="sections-container"></div>
</main>

<!-- ══════════════════════════════
     MODAL
══════════════════════════════ -->
<dialog id="modal">
  <span class="sr-only">Aperçu</span>
  <div class="modal-bar">
    <div class="modal-dots" aria-hidden="true">
      <div class="modal-dot r"></div>
      <div class="modal-dot y"></div>
      <div class="modal-dot g"></div>
    </div>
    <div class="modal-title-bar" aria-hidden="true">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
      </svg>
      <span id="modal-url">–</span>
    </div>
    <div class="modal-actions">
      <div class="view-toggle" role="group">
        <button type="button" id="btn-view-render" class="toggle-btn active" aria-pressed="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>Rendu</span>
        </button>
        <button type="button" id="btn-view-source" class="toggle-btn" aria-pressed="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          <span>Source</span>
        </button>
      </div>
      <button type="button" id="btn-modal-copy" class="modal-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span>Copier</span>
      </button>
      <a id="btn-modal-newtab" href="#" target="_blank" rel="noopener noreferrer" class="modal-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        <span>Onglet</span>
      </a>
      <button type="button" id="btn-close" class="modal-btn" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        <span>Fermer</span>
      </button>
    </div>
  </div>
  <div class="modal-content-area">
    <iframe id="modal-iframe-render" title="Rendu live"
      sandbox="allow-scripts allow-forms allow-modals allow-popups"
      referrerpolicy="no-referrer"></iframe>
    <div id="modal-source-view" class="hidden">
      <pre id="modal-source-code"></pre>
    </div>
  </div>
</dialog>

<!-- TOAST -->
<div id="toast" role="status" aria-live="polite" aria-atomic="true">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
  <span id="toast-msg">OK</span>
</div>

<!-- ══════════════════════════════════════════════
     JAVASCRIPT — tout dans le HTML, aucune dépendance
══════════════════════════════════════════════ -->
<script>
(function() {
'use strict';

/* ─── CONFIG ─────────────────────────────── */
const API_BASE   = 'https://stuffone-backend.onrender.com';
const API_ROUTES = [
  '/api/structures','/api/sites','/structures','/sites',
  '/api/pages','/pages','/api/items','/items'
];
const SECTIONS = [
  { id:'accueil',   label:'Accueil',       color:'#e8ff47', kw:['accueil','home','index','hero'] },
  { id:'landing',   label:'Landing Pages', color:'#47c4ff', kw:['landing','lp','promo','funnel','conversion'] },
  { id:'ecommerce', label:'E-commerce',    color:'#ff8c47', kw:['shop','store','boutique','ecommerce','produit','product','cart','panier'] },
  { id:'dashboard', label:'Dashboard',     color:'#c447ff', kw:['dashboard','admin','panel','analytics','stats','backoffice'] },
  { id:'portfolio', label:'Portfolio',     color:'#47ffb5', kw:['portfolio','folio','about','projets','projects','cv'] },
  { id:'blog',      label:'Blog',          color:'#ff4776', kw:['blog','article','post','news','journal','actu'] },
  { id:'autres',    label:'Autres',        color:'#888',    kw:[] }
];

/* ─── STATE ──────────────────────────────── */
let allData       = [];
let deletedIds    = new Set();
let activeSection = 'all';
let currentSite   = null; // site lié au menu latéral ouvert

/* ─── UTILS ──────────────────────────────── */
const $   = id => document.getElementById(id);
const esc = s  => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ini = s  => s.split(/\s+/).map(w=>w[0]||'').join('').slice(0,3).toUpperCase();
const fmt = d  => { try { return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); } catch{return '';} };
function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), ms); }; }
function secColor(id) { return SECTIONS.find(s=>s.id===id)?.color || '#888'; }
function secLabel(id) { return SECTIONS.find(s=>s.id===id)?.label || id; }

/* ─── CLASSIFY ───────────────────────────── */
function classify(title, category) {
  const hay = (title + ' ' + category).toLowerCase();
  for (const s of SECTIONS) {
    if (s.id === 'autres') continue;
    if (s.kw.some(k => hay.includes(k))) return s.id;
  }
  return 'autres';
}

/* ─── NORMALIZE ──────────────────────────── */
function normalizeItem(r) {
  const title    = r.title    || r.name  || r.label   || 'Sans titre';
  const category = r.category || r.type  || r.section || 'Autre';
  return {
    id:          String(r.id ?? r._id ?? Math.random()),
    title,
    category,
    section:     classify(title, category),
    path:        r.path || r.url || r.link || r.src || '#',
    source_code: r.source_code || r.html || r.code || null,
    created_at:  r.created_at || r.date  || r.updatedAt || null
  };
}
function normalizeResponse(data) {
  if (Array.isArray(data)) return data.map(normalizeItem);
  for (const k of ['data','structures','sites','pages','items','results','records'])
    if (data[k] && Array.isArray(data[k])) return data[k].map(normalizeItem);
  if (data.id || data._id || data.title) return [normalizeItem(data)];
  return [];
}

/* ─── API ────────────────────────────────── */
async function apiFetch() {
  const errs = [];
  for (const route of API_ROUTES) {
    try {
      const res = await fetch(API_BASE + route, {
        headers: { Accept: 'application/json' },
        signal:  AbortSignal.timeout(12000)
      });
      if (!res.ok) { errs.push(route + ' → HTTP ' + res.status); continue; }
      if (!(res.headers.get('content-type')||'').includes('application/json')) { errs.push(route + ' → non-JSON'); continue; }
      const items = normalizeResponse(await res.json());
      if (!items.length) { errs.push(route + ' → vide'); continue; }
      console.info('[WebVault] ✓', route, '—', items.length, 'structures');
      return items;
    } catch(e) { errs.push(route + ' → ' + e.message); }
  }
  throw new Error(errs.join('\n'));
}

/* ─── TOAST ──────────────────────────────── */
let toastTimer;
function toast(msg) {
  $('toast-msg').textContent = msg;
  $('toast').classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => $('toast').classList.remove('show'), 2400);
}

/* ─── COPY ───────────────────────────────── */
function copyCode(site, btn) {
  const text = site.source_code || [
    '<iframe src="' + site.path + '" title="' + esc(site.title) + '"',
    '  width="100%" height="600" loading="lazy"',
    '  sandbox="allow-scripts allow-forms allow-popups"',
    '  referrerpolicy="no-referrer" frameborder="0"></iframe>'
  ].join('\n');

  const orig = btn ? btn.innerHTML : '';
  const done = () => {
    toast('Code copié !');
    if (!btn) return;
    btn.classList.add('copied');
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>Copié !';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 2200);
  };
  if (navigator.clipboard) navigator.clipboard.writeText(text).then(done).catch(() => fbCopy(text, done));
  else fbCopy(text, done);
}
function fbCopy(text, cb) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb(); } catch {}
  ta.remove();
}

/* ─── MENU LATÉRAL GLOBAL ────────────────────
   Un seul panneau dans le <body>.
   On l'ouvre depuis le bouton 3 points.
   Il glisse depuis la droite (CSS transform).
   Pas de position:fixed dans les cards,
   donc aucun problème de z-index / clipping.
─────────────────────────────────────────── */
const sideMenu      = $('side-menu');
const sideMenuScrim = $('side-menu-scrim');

function openSideMenu(site) {
  currentSite = site;

  /* Titre */
  $('side-menu-title').textContent = site.title;

  /* Injecte les items */
  const items = $('side-menu-items');
  items.innerHTML = '';

  const mkItem = (icon, title, sub, cls, cb) => {
    const btn = document.createElement('button');
    btn.type      = 'button';
    btn.className = 'side-menu-item' + (cls ? ' ' + cls : '');
    btn.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' + icon + '</svg>' +
      '<span class="item-label"><span class="item-title">' + title + '</span>' +
      (sub ? '<span class="item-sub">' + sub + '</span>' : '') + '</span>';
    btn.addEventListener('click', () => { closeSideMenu(); cb(); });
    /* touchend pour réactivité immédiate mobile */
    btn.addEventListener('touchend', e => { e.preventDefault(); closeSideMenu(); cb(); }, { passive:false });
    items.appendChild(btn);
  };

  mkItem(
    '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>',
    'Voir le rendu', 'Ouvre l\'interpréteur', '',
    () => openModal(site)
  );

  if (site.path && site.path !== '#') {
    mkItem(
      '<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>',
      'Ouvrir dans un onglet', site.path.length > 40 ? site.path.slice(0,40)+'…' : site.path, '',
      () => window.open(site.path, '_blank', 'noopener,noreferrer')
    );
  }

  mkItem(
    '<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>',
    'Copier le HTML', site.source_code ? 'Code source intégré' : 'Snippet iframe', '',
    () => copyCode(site, null)
  );

  /* Divider */
  const div = document.createElement('div');
  div.className = 'side-menu-divider';
  items.appendChild(div);

  mkItem(
    '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/>',
    'Supprimer', 'Retirer de la galerie', 'danger',
    () => deleteCard(site)
  );

  /* Ouvre */
  sideMenu.classList.add('open');
  sideMenu.setAttribute('aria-hidden', 'false');
  sideMenuScrim.classList.add('open');
  sideMenuScrim.setAttribute('aria-hidden', 'false');

  /* Focus premier item */
  setTimeout(() => items.querySelector('button')?.focus(), 60);
}

function closeSideMenu() {
  sideMenu.classList.remove('open');
  sideMenu.setAttribute('aria-hidden', 'true');
  sideMenuScrim.classList.remove('open');
  sideMenuScrim.setAttribute('aria-hidden', 'true');
  currentSite = null;
}

$('side-menu-close').addEventListener('click', closeSideMenu);
$('side-menu-close').addEventListener('touchend', e => { e.preventDefault(); closeSideMenu(); }, { passive:false });
sideMenuScrim.addEventListener('click', closeSideMenu);
sideMenuScrim.addEventListener('touchend', e => { e.preventDefault(); closeSideMenu(); }, { passive:false });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && sideMenu.classList.contains('open')) closeSideMenu(); });

/* ─── DELETE ─────────────────────────────── */
function deleteCard(site) {
  deletedIds.add(site.id);
  const cardEl = document.querySelector('.card[data-id="' + site.id + '"]');
  if (!cardEl) return;
  cardEl.style.transition = 'opacity .25s, transform .25s';
  cardEl.style.opacity    = '0';
  cardEl.style.transform  = 'scale(0.95)';
  setTimeout(() => {
    cardEl.remove();
    const secEl = $('sec-' + site.section);
    if (secEl) {
      const rem = secEl.querySelectorAll('.card').length;
      if (rem === 0) { secEl.remove(); buildNav(); }
      else {
        const pill = secEl.querySelector('.section-pill');
        if (pill) pill.textContent = rem + ' structure' + (rem > 1 ? 's' : '');
      }
    }
    $('visible-count').textContent = document.querySelectorAll('.card').length;
    $('footer-count').textContent  = allData.length - deletedIds.size;
    toast('Supprimé');
  }, 280);
}

/* ─── MODAL ──────────────────────────────── */
const modalEl    = $('modal');
const iframeEl   = $('modal-iframe-render');
const sourceView = $('modal-source-view');
const sourceCode = $('modal-source-code');
let   modalSite  = null;

function openModal(site) {
  modalSite = site;
  $('modal-url').textContent = site.title;
  const ntBtn = $('btn-modal-newtab');
  ntBtn.href = (site.path && site.path !== '#') ? site.path : '#';
  ntBtn.style.display = (site.path && site.path !== '#') ? '' : 'none';
  if (site.source_code) {
    iframeEl.srcdoc = site.source_code;
    sourceCode.textContent = site.source_code;
  } else {
    iframeEl.removeAttribute('srcdoc');
    iframeEl.src = site.path;
    sourceCode.textContent = '/* URL : ' + site.path + ' */';
  }
  setModalView('render');
  modalEl.showModal();
  requestAnimationFrame(() => modalEl.classList.add('is-open'));
  $('btn-close').focus();
}
function closeModal() {
  modalEl.classList.remove('is-open');
  setTimeout(() => {
    modalEl.close();
    iframeEl.srcdoc = '';
    iframeEl.removeAttribute('src');
    sourceCode.textContent = '';
    modalSite = null;
  }, 260);
}
function setModalView(v) {
  const r = v === 'render';
  $('btn-view-render').classList.toggle('active', r);
  $('btn-view-source').classList.toggle('active', !r);
  $('btn-view-render').setAttribute('aria-pressed', String(r));
  $('btn-view-source').setAttribute('aria-pressed', String(!r));
  iframeEl.classList.toggle('hidden', !r);
  sourceView.classList.toggle('hidden', r);
}
$('btn-view-render').addEventListener('click', () => setModalView('render'));
$('btn-view-source').addEventListener('click', () => setModalView('source'));
$('btn-modal-copy').addEventListener('click', () => { if (modalSite) copyCode(modalSite, null); });
$('btn-close').addEventListener('click', closeModal);
modalEl.addEventListener('cancel', e => { e.preventDefault(); closeModal(); });
modalEl.addEventListener('click',  e => { if (e.target === modalEl) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && modalEl.open) closeModal(); });

/* ─── BUILD CARD ─────────────────────────── */
const cardTpl = $('card-tpl');

function buildCard(site, idx, color) {
  const node  = cardTpl.content.cloneNode(true);
  const card  = node.querySelector('.card');
  card.dataset.id = site.id;
  card.style.animationDelay = Math.min(idx * 0.035, 0.5) + 's';

  /* Thumbnail → ouvre la modale */
  const thumb = card.querySelector('.card-thumb');
  thumb.setAttribute('aria-label', 'Voir le rendu de ' + esc(site.title));

  function handleThumbClick(e) {
    e.preventDefault();
    e.stopPropagation();
    openModal(site);
  }
  thumb.addEventListener('click', handleThumbClick);
  thumb.addEventListener('touchend', handleThumbClick, { passive: false });
  thumb.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); openModal(site); } });

  /* Style */
  const bg = card.querySelector('.card-thumb-bg');
  bg.style.background = 'radial-gradient(ellipse at 30% 40%, ' + color + '1a 0%, transparent 65%), #111';
  card.querySelector('.card-thumb-icon').textContent = ini(site.title);

  const catEl = card.querySelector('.card-category');
  catEl.textContent       = site.category;
  catEl.style.color       = color;
  catEl.style.background  = color + '1a';
  catEl.style.borderColor = color + '30';

  card.querySelector('.card-date').textContent  = site.created_at ? fmt(site.created_at) : '';
  card.querySelector('.card-title').textContent = site.title;
  card.querySelector('.card-path').textContent  = site.source_code ? '(code intégré)' : (site.path || '');

  /* Bouton Copier */
  const copyBtn = card.querySelector('.btn-copy');
  function handleCopy(e) {
    e.preventDefault();
    e.stopPropagation();
    copyCode(site, copyBtn);
  }
  copyBtn.addEventListener('click',    handleCopy);
  copyBtn.addEventListener('touchend', handleCopy, { passive: false });

  /* Bouton 3 points → ouvre le menu latéral global */
  const dotsBtn = card.querySelector('.btn-dots');
  function handleDots(e) {
    e.preventDefault();
    e.stopPropagation();
    openSideMenu(site);
  }
  dotsBtn.addEventListener('click',    handleDots);
  dotsBtn.addEventListener('touchend', handleDots, { passive: false });

  return node;
}

/* ─── RENDER ─────────────────────────────── */
function renderSections(items) {
  const container = $('sections-container');
  container.innerHTML = '';
  const bySec = {};
  items.forEach(s => { if (!bySec[s.section]) bySec[s.section] = []; bySec[s.section].push(s); });

  SECTIONS.forEach(sec => {
    const list = bySec[sec.id];
    if (!list || !list.length) return;
    const group = document.createElement('section');
    group.className       = 'section-group';
    group.id              = 'sec-' + sec.id;
    group.dataset.section = sec.id;
    group.innerHTML =
      '<div class="section-header">' +
        '<h2 class="section-title" style="color:' + sec.color + '">' + esc(sec.label) + '</h2>' +
        '<span class="section-pill" style="color:' + sec.color + ';background:' + sec.color + '1a;border-color:' + sec.color + '30">' +
          list.length + ' structure' + (list.length > 1 ? 's' : '') +
        '</span>' +
      '</div>';
    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    grid.setAttribute('role', 'list');
    const frag = document.createDocumentFragment();
    list.forEach((site, i) => frag.appendChild(buildCard(site, i, sec.color)));
    grid.appendChild(frag);
    group.appendChild(grid);
    container.appendChild(group);
  });

  $('visible-count').textContent = items.length;
  buildNav();
}

/* ─── SEARCH ─────────────────────────────── */
function runSearch(q) {
  const ql = q.trim().toLowerCase();
  const filtered = allData.filter(s => {
    if (deletedIds.has(s.id)) return false;
    const secOk = activeSection === 'all' || s.section === activeSection;
    if (!ql) return secOk;
    return secOk && (
      s.title.toLowerCase().includes(ql) ||
      s.category.toLowerCase().includes(ql) ||
      secLabel(s.section).toLowerCase().includes(ql) ||
      (s.source_code && s.source_code.toLowerCase().includes(ql))
    );
  });
  const empty = $('empty-state');
  if (!filtered.length) { $('sections-container').innerHTML = ''; empty.classList.add('visible'); }
  else { empty.classList.remove('visible'); renderSections(filtered); }
}

/* ─── SEARCH INPUT ───────────────────────── */
const searchInput = $('search-input');
const doSearch = debounce(() => runSearch(searchInput.value), 220);

searchInput.addEventListener('input',   doSearch);
/* Empêche Entrée de recharger */
searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') e.preventDefault(); });

/* ─── NAV ────────────────────────────────── */
function buildNav() {
  const menu  = $('nav-menu');
  menu.innerHTML = '';
  const total = allData.length - deletedIds.size;
  menu.appendChild(navItem('all', 'Toutes', total, '#888'));
  SECTIONS.forEach(sec => {
    const el = $('sec-' + sec.id);
    if (!el) return;
    const count = el.querySelectorAll('.card').length;
    if (!count) return;
    menu.appendChild(navItem(sec.id, sec.label, count, sec.color));
  });
  $('footer-count').textContent = total;
}

function navItem(id, label, count, color) {
  const btn = document.createElement('button');
  btn.type      = 'button';
  btn.className = 'nav-item' + (activeSection === id ? ' active' : '');
  btn.setAttribute('role', 'listitem');

  const dot = document.createElement('span');
  dot.className = 'nav-dot';
  if (id !== 'all') { dot.style.background = color; dot.style.opacity = '0.65'; }

  const badge = document.createElement('span');
  badge.className = 'nav-count'; badge.textContent = count;

  btn.appendChild(dot);
  btn.appendChild(document.createTextNode(' ' + label + ' '));
  btn.appendChild(badge);

  function handleNav() {
    activeSection = id;
    $('current-section-label').textContent = id === 'all' ? 'Toutes' : label;
    if (id === 'all') {
      document.querySelectorAll('.section-group').forEach(g => g.style.display = '');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      document.querySelectorAll('.section-group').forEach(g => {
        g.style.display = g.dataset.section === id ? '' : 'none';
      });
      $('sec-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    runSearch(searchInput.value);
    if (window.innerWidth <= 900) closeSidebar();
  }
  btn.addEventListener('click',    handleNav);
  btn.addEventListener('touchend', e => { e.preventDefault(); handleNav(); }, { passive: false });
  return btn;
}

/* ─── SIDEBAR ────────────────────────────── */
function openSidebar() {
  $('sidebar').classList.add('drawer-open');
  $('sidebar-scrim').classList.add('visible');
  $('sidebar-scrim').removeAttribute('aria-hidden');
  $('btn-burger').setAttribute('aria-expanded','true');
}
function closeSidebar() {
  $('sidebar').classList.remove('drawer-open');
  $('sidebar-scrim').classList.remove('visible');
  $('sidebar-scrim').setAttribute('aria-hidden','true');
  $('btn-burger').setAttribute('aria-expanded','false');
}
$('btn-burger').addEventListener('click', () =>
  $('sidebar').classList.contains('drawer-open') ? closeSidebar() : openSidebar()
);
$('sidebar-scrim').addEventListener('click', closeSidebar);
$('sidebar-scrim').addEventListener('touchend', e => { e.preventDefault(); closeSidebar(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (modalEl.open) closeModal();
    else if ($('sidebar').classList.contains('drawer-open')) closeSidebar();
  }
});

/* ─── INIT ───────────────────────────────── */
async function loadData() {
  $('loading-state').classList.remove('hidden');
  $('api-error-state').style.display = 'none';
  $('empty-state').classList.remove('visible');
  $('sections-container').innerHTML  = '';
  try {
    allData = await apiFetch();
    $('loading-state').classList.add('hidden');
    runSearch('');
  } catch(err) {
    console.error('[WebVault]', err);
    $('loading-state').classList.add('hidden');
    $('api-error-state').style.display = 'flex';
    $('api-error-msg').textContent = err.message;
  }
}
$('btn-retry').addEventListener('click', loadData);
loadData();

})(); // IIFE — pas de pollution globale
</script>
</body>
</html>
