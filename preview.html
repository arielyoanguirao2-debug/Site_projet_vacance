<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aperçu — StuffOne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:black;font-family:'DM Mono',monospace;color:white;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

    /* ── TOPBAR ── */
    .topbar{
      width:100%;height:60px;padding:0 14px;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      flex-shrink:0;position:relative;z-index:100;
      background:rgba(0,0,0,0.9);backdrop-filter:blur(12px);
    }

    .back-btn{
      width:36px;height:36px;border-radius:10px;
      background:#111;border:1px solid rgba(255,255,255,0.06);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:16px;flex-shrink:0;
      text-decoration:none;color:white;transition:0.15s;
    }
    .back-btn:hover{background:#1c1c1c;}

    .topbar-title{
      font-size:12px;color:rgba(255,255,255,0.35);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      flex:1;
    }
    .topbar-title span{color:white;}

    /* ── TABS ── */
    .tabs{
      display:flex;align-items:center;gap:3px;
      background:#111;border:1px solid rgba(255,255,255,0.06);
      border-radius:10px;padding:3px;flex-shrink:0;
    }
    .tab-btn{
      padding:5px 12px;border-radius:7px;border:none;
      background:transparent;color:rgba(255,255,255,0.3);
      font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:0.15s;
    }
    .tab-btn.active{background:#1c1c1c;color:white;}

    /* ── SIZE SWITCHER ── */
    .size-switcher{
      display:flex;gap:3px;background:#111;
      border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:3px;flex-shrink:0;
    }
    .size-btn{
      width:28px;height:28px;border-radius:6px;border:none;
      background:transparent;color:rgba(255,255,255,0.3);
      cursor:pointer;font-size:12px;transition:0.15s;
      display:flex;align-items:center;justify-content:center;
    }
    .size-btn.active{background:#1c1c1c;color:white;}

    /* ── TOPBAR ACTIONS ── */
    .topbar-actions{display:flex;gap:6px;flex-shrink:0;}
    .action-btn{
      height:34px;padding:0 12px;border-radius:9px;
      background:#111;border:1px solid rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.5);font-family:'DM Mono',monospace;
      font-size:11px;cursor:pointer;transition:0.15s;white-space:nowrap;
    }
    .action-btn:hover{background:#1c1c1c;color:white;}
    .action-btn.fav-active{color:#f43f5e;}

    /* ── MENU ── */
    .menu-btn{
      width:36px;height:36px;border-radius:10px;
      background:#111;border:1px solid rgba(255,255,255,0.06);
      display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    }
    .menu-dots{display:flex;flex-direction:column;gap:3px;}
    .menu-dots span{width:3px;height:3px;background:white;border-radius:50%;}

    .dropdown{
      position:absolute;top:66px;right:14px;width:200px;
      background:#111;border:1px solid rgba(255,255,255,0.08);
      border-radius:14px;overflow:hidden;display:none;z-index:200;
    }
    .dropdown.show{display:block;}
    .dropdown button{
      width:100%;padding:13px 16px;background:none;border:none;
      border-bottom:1px solid rgba(255,255,255,0.04);
      color:white;text-align:left;cursor:pointer;
      font-family:'DM Mono',monospace;font-size:12px;transition:0.15s;
      display:flex;align-items:center;gap:10px;
    }
    .dropdown button:last-child{border-bottom:none;}
    .dropdown button:hover{background:#1c1c1c;}
    .icon{opacity:0.4;}

    /* ── CONTENT ── */
    .content{flex:1;overflow:hidden;position:relative;}

    /* ── PREVIEW ── */
    #preview-panel{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;background:#0a0a0a;}

    .preview-viewport{
      flex:1;width:100%;display:flex;align-items:flex-start;justify-content:center;
      overflow:auto;padding:16px;
    }

    .preview-frame-wrap{
      background:white;border-radius:8px;overflow:hidden;
      transition:width 0.3s ease;box-shadow:0 0 0 1px rgba(255,255,255,0.06);
      flex-shrink:0;
    }

    #preview-frame{width:100%;border:none;display:block;}

    .preview-empty{
      flex:1;display:flex;align-items:center;justify-content:center;
      color:#333;font-size:13px;
    }

    /* ── CODE PANEL ── */
    #code-panel{width:100%;height:100%;display:none;flex-direction:column;}
    .code-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
    .code-tab{
      padding:10px 20px;font-family:'DM Mono',monospace;font-size:11px;
      border:none;background:transparent;color:rgba(255,255,255,0.3);
      cursor:pointer;border-bottom:2px solid transparent;transition:0.15s;
    }
    .code-tab.active{color:white;border-bottom-color:white;}
    .code-blocks{flex:1;overflow:hidden;position:relative;}
    .code-block{display:none;width:100%;height:100%;overflow:auto;padding:20px;}
    .code-block.active{display:block;}
    .code-block pre{font-family:'DM Mono',monospace;font-size:11px;line-height:1.8;color:rgba(255,255,255,0.65);white-space:pre-wrap;word-break:break-all;}

    /* ── SKELETON PREVIEW ── */
    .preview-skeleton{
      width:100%;height:100%;
      background:linear-gradient(90deg,#0f0f0f 25%,#161616 50%,#0f0f0f 75%);
      background-size:200% 100%;animation:shimmer 1.4s infinite;
    }
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

    /* ── LOADER ── */
    .loader{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:black;z-index:50;}
    .loader-dot{width:6px;height:6px;background:rgba(255,255,255,0.2);border-radius:50%;margin:0 3px;animation:pulse 1.2s ease-in-out infinite;}
    .loader-dot:nth-child(2){animation-delay:0.2s;}
    .loader-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes pulse{0%,80%,100%{transform:scale(0.7);opacity:0.3;}40%{transform:scale(1);opacity:1;}}

    /* ── TOAST ── */
    .toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(16px);
      background:#1c1c1c;border:1px solid rgba(255,255,255,0.08);
      color:white;padding:10px 20px;border-radius:10px;
      font-size:12px;opacity:0;transition:0.3s;pointer-events:none;z-index:999;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  </style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-dot"></div><div class="loader-dot"></div><div class="loader-dot"></div>
</div>

<header class="topbar">

  <a href="index.html" class="back-btn" title="Retour">←</a>

  <div class="topbar-title" id="topbar-title">Chargement…</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('preview',this)">Aperçu</button>
    <button class="tab-btn" onclick="switchTab('code',this)">Code</button>
  </div>

  <div class="size-switcher" id="size-switcher">
    <button class="size-btn active" onclick="setSize('full',this)" title="Plein écran">⊡</button>
    <button class="size-btn" onclick="setSize('tablet',this)" title="Tablette">▭</button>
    <button class="size-btn" onclick="setSize('mobile',this)" title="Mobile">▯</button>
  </div>

  <div class="topbar-actions">
    <button class="action-btn" id="fav-btn" onclick="handleFav()">♥</button>
    <button class="action-btn" onclick="handleShare()">⎘ Partager</button>
    <button class="action-btn" onclick="copyAll()">⎘ Copier</button>
  </div>

  <button class="menu-btn" onclick="toggleMenu()">
    <div class="menu-dots"><span></span><span></span><span></span></div>
  </button>

  <div class="dropdown" id="dropdown">
    <button onclick="switchTab('preview',null);closeMenu()"><span class="icon">◻</span> Aperçu</button>
    <button onclick="switchTab('code',null);closeMenu()"><span class="icon">&lt;/&gt;</span> Code source</button>
    <button onclick="copyAll();closeMenu()"><span class="icon">⎘</span> Copier tout</button>
    <button onclick="handleShare();closeMenu()"><span class="icon">↗</span> Partager</button>
  </div>

</header>

<div class="content">

  <!-- PREVIEW -->
  <div id="preview-panel">
    <div class="preview-viewport" id="preview-viewport">
      <div class="preview-skeleton" id="preview-skeleton"></div>
    </div>
  </div>

  <!-- CODE -->
  <div id="code-panel">
    <div class="code-tabs">
      <button class="code-tab active" onclick="switchCode('html',this)">HTML</button>
      <button class="code-tab" onclick="switchCode('css',this)">CSS</button>
      <button class="code-tab" onclick="switchCode('js',this)">JS</button>
    </div>
    <div class="code-blocks">
      <div class="code-block active" id="block-html"><pre id="code-html"></pre></div>
      <div class="code-block" id="block-css"><pre id="code-css"></pre></div>
      <div class="code-block" id="block-js"><pre id="code-js"></pre></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API="https://stuffone-backend-production.up.railway.app";
const params=new URLSearchParams(window.location.search);
const STRUCT_ID=params.get("id");

let structureData=null;
let currentTab="preview";
let currentSize="full";

const SIZES={
  full:  {width:"100%",   label:"Plein écran"},
  tablet:{width:"768px",  label:"Tablette"},
  mobile:{width:"375px",  label:"Mobile"},
};

/* ── FAVORIS ── */
function getFavs(){return JSON.parse(localStorage.getItem("stuffone_favs")||"[]");}
function isFav(id){return getFavs().includes(id);}
function toggleFavById(id){
  let favs=getFavs();
  if(favs.includes(id))favs=favs.filter(f=>f!==id);
  else favs.push(id);
  localStorage.setItem("stuffone_favs",JSON.stringify(favs));
  return favs.includes(id);
}

/* ── INIT ── */
async function init(){
  if(!STRUCT_ID){
    hideLoader();
    document.getElementById("topbar-title").textContent="Aucun ID fourni";
    return;
  }

  // Mettre à jour le bouton favori
  updateFavBtn();

  try{
    const[codeResp,metaResp]=await Promise.all([
      fetch(`${API}/structures/${STRUCT_ID}/code`),
      fetch(`${API}/structures/${STRUCT_ID}`)
    ]);

    const codeData=await codeResp.json();
    const meta=await metaResp.json();

    if(!codeData.success)throw new Error("Introuvable");

    structureData=codeData;

    // Titre
    document.getElementById("topbar-title").innerHTML=`<span>${meta.title||"Structure #"+STRUCT_ID}</span>`;
    document.title=`${meta.title||"Aperçu"} — StuffOne`;

    // Code blocks
    document.getElementById("code-html").textContent=codeData.html||"(vide)";
    document.getElementById("code-css").textContent=codeData.css||"(vide)";
    document.getElementById("code-js").textContent=codeData.js||"(vide)";

    renderPreview(codeData.html,codeData.css,codeData.js);
    hideLoader();

  }catch(e){
    hideLoader();
    document.getElementById("topbar-title").textContent="Erreur";
    document.getElementById("preview-viewport").innerHTML=`<div style="color:#333;font-size:13px;padding:40px">${e.message}</div>`;
  }
}

/* ── PREVIEW ── */
function renderPreview(html,css,js){
  const viewport=document.getElementById("preview-viewport");
  viewport.innerHTML="";

  const wrap=document.createElement("div");
  wrap.className="preview-frame-wrap";
  wrap.id="preview-wrap";
  applySize(wrap,currentSize);

  const doc=`<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>*{box-sizing:border-box;}${css||""}</style></head><body>${html||""}<script>try{${js||""}}catch(e){}<\/script></body></html>`;

  const frame=document.createElement("iframe");
  frame.id="preview-frame";
  frame.srcdoc=doc;
  frame.sandbox="allow-scripts allow-same-origin";
  frame.style.height="600px";

  // Auto-resize iframe height
  frame.onload=()=>{
    try{
      const h=frame.contentDocument?.body?.scrollHeight;
      if(h&&h>100)frame.style.height=h+"px";
    }catch(e){}
  };

  wrap.appendChild(frame);
  viewport.appendChild(wrap);
}

/* ── SIZE ── */
function setSize(size,btn){
  currentSize=size;
  document.querySelectorAll(".size-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  const wrap=document.getElementById("preview-wrap");
  if(wrap)applySize(wrap,size);
}

function applySize(wrap,size){
  wrap.style.width=SIZES[size].width;
  wrap.style.minWidth=size==="full"?"0":"unset";
}

/* ── TABS ── */
function switchTab(tab,btn){
  currentTab=tab;
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  else{
    document.querySelectorAll(".tab-btn").forEach(b=>{
      if((tab==="preview"&&b.textContent.includes("Aperçu"))||(tab==="code"&&b.textContent.includes("Code")))
        b.classList.add("active");
    });
  }
  document.getElementById("preview-panel").style.display=tab==="preview"?"flex":"none";
  document.getElementById("code-panel").style.display=tab==="code"?"flex":"none";
  // Cacher size switcher en mode code
  document.getElementById("size-switcher").style.display=tab==="preview"?"flex":"none";
}

function switchCode(lang,btn){
  document.querySelectorAll(".code-tab").forEach(b=>b.classList.remove("active"));
  document.querySelectorAll(".code-block").forEach(b=>b.classList.remove("active"));
  if(btn)btn.classList.add("active");
  document.getElementById("block-"+lang).classList.add("active");
}

/* ── FAV ── */
function updateFavBtn(){
  const btn=document.getElementById("fav-btn");
  if(isFav(STRUCT_ID)){btn.classList.add("fav-active");btn.title="Retirer des favoris";}
  else{btn.classList.remove("fav-active");btn.title="Ajouter aux favoris";}
}
function handleFav(){
  const active=toggleFavById(STRUCT_ID);
  updateFavBtn();
  showToast(active?"Ajouté aux favoris":"Retiré des favoris");
}

/* ── SHARE ── */
function handleShare(){
  navigator.clipboard.writeText(window.location.href)
    .then(()=>showToast("Lien copié !"))
    .catch(()=>showToast("Erreur copie"));
}

/* ── COPY ALL ── */
function copyAll(){
  if(!structureData){showToast("Rien à copier");return;}
  const full=`${structureData.html}\n<style>\n${structureData.css}\n</style>\n<script>\n${structureData.js}\n<\/script>`;
  navigator.clipboard.writeText(full)
    .then(()=>showToast("Code copié !"))
    .catch(()=>showToast("Erreur copie"));
}

/* ── MENU ── */
function toggleMenu(){document.getElementById("dropdown").classList.toggle("show");}
function closeMenu(){document.getElementById("dropdown").classList.remove("show");}
document.addEventListener("click",e=>{
  if(!e.target.closest(".menu-btn")&&!e.target.closest(".dropdown"))closeMenu();
});

/* ── UTILS ── */
function hideLoader(){document.getElementById("loader").style.display="none";}
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2200);
}

init();
</script>
</body>
</html>
